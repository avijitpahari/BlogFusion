<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body {
      background-color: #f8fafc;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
  </style>
</head>

<body class="min-h-screen py-12 px-6">

  <div id="portfolio-container" class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">

    <div class="lg:col-span-4">
      <div class="bg-white rounded-[2rem] shadow-xl border border-gray-100 overflow-hidden sticky top-10">
        <div class="h-32 bg-indigo-600"></div>
        <div class="px-8 pb-10 text-center">
          <div class="relative -mt-16 mb-6">
            <img id="user-img" class="w-36 h-36 rounded-3xl border-4 border-white shadow-lg mx-auto object-cover" src=""
              alt="Profile">
          </div>
          <h1 id="user-name" class="text-3xl font-bold text-gray-900"></h1>
          <p id="user-roll" class="text-indigo-600 font-bold text-sm mt-2"></p>

          <div class="mt-10 space-y-3 text-left">
            <div class="flex items-center p-4 bg-gray-50 rounded-2xl">
              <i class="fas fa-envelope text-indigo-500 mr-4"></i>
              <span id="user-email" class="text-sm truncate"></span>
            </div>
            <div class="flex items-center p-4 bg-gray-50 rounded-2xl">
              <i class="fas fa-phone text-indigo-500 mr-4"></i>
              <span id="user-contact" class="text-sm"></span>
            </div>
            <div class="flex items-center p-4 bg-gray-50 rounded-2xl">
              <i class="fas fa-map-marker-alt text-indigo-500 mr-4"></i>
              <span id="user-address" class="text-sm"></span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="lg:col-span-8 space-y-8">
      <div class="bg-white p-10 rounded-[2rem] shadow-lg border border-gray-100">
        <h2 class="text-2xl font-bold text-gray-800 mb-8"><i class="fas fa-graduation-cap mr-3 text-indigo-600"></i>
          Education</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
          <div>
            <p class="text-xs font-bold text-indigo-500 uppercase">College</p>
            <h3 id="college-degree" class="text-lg font-bold"></h3>
            <p id="college-name" class="text-gray-500 text-sm"></p>
          </div>
          <div>
            <p class="text-xs font-bold text-emerald-500 uppercase">School</p>
            <h3 id="school-name" class="text-lg font-bold"></h3>
            <p id="school-year" class="text-gray-500 text-sm"></p>
          </div>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="bg-white p-10 rounded-[2rem] shadow-lg border border-gray-100">
          <h2 class="text-xl font-bold text-gray-800 mb-6">Skills</h2>
          <div id="skills-list" class="flex flex-wrap gap-2"></div>
        </div>
        <div class="bg-white p-10 rounded-[2rem] shadow-lg border border-gray-100">
          <h2 class="text-xl font-bold text-gray-800 mb-6">Hobbies</h2>
          <div id="hobbies-list" class="grid grid-cols-2 gap-3"></div>
        </div>
      </div>
    </div>
  </div>

  <script>

    (async function () {
        const response = await fetch("https://shyam7870.github.io/portfolio_json/portfolio.json");
        const data = await response.json();
        const user = data[0];
        document.getElementById('user-name').innerText = user.NAME;
        document.getElementById('user-roll').innerText = "Roll: " + user.ROLL;
        document.getElementById('user-email').innerText = user.EMAIL;
        document.getElementById('user-contact').innerText = user.CONTACT;
        document.getElementById('user-address').innerText = user.ADDRESS;
        document.getElementById('user-img').src = user.IMAGE;
        document.getElementById('college-degree').innerText = user.COLLEGE.DEGREE;
        document.getElementById('college-name').innerText = user.COLLEGE.INSTITUTION;
        document.getElementById('school-name').innerText = user.SCHOOL["HIGH SCHOOL"];
        document.getElementById('school-year').innerText = "Passed in " + user.SCHOOL["FINISH YEAR"];

        const skillsDiv = document.getElementById('skills-list');
        Object.values(user.SKILLS).forEach(skill => {
          skillsDiv.innerHTML += `
                        <span class="px-4 py-2 bg-indigo-50 text-indigo-700 rounded-xl text-xs font-bold border border-indigo-100">
                            ${skill}
                        </span>`;
        });

        const hobbiesDiv = document.getElementById('hobbies-list');
        Object.values(user.HOBBIS).forEach(hobby => {
          hobbiesDiv.innerHTML += `
                        <div class="bg-gray-50 p-3 rounded-xl text-sm text-gray-600">
                            <i class="fas fa-check text-indigo-400 mr-2"></i> ${hobby}
                        </div>`;
        });

      
    })();
  </script>
</body>

</html>
